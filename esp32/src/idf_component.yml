dependencies:
  idf:
    version: ">=5.0.0"
    
  espressif/mdns:
    version: "^1.3.0"
    
  joltwallet/littlefs:
    version: "^1.14.0"
    
  espressif/esp-dsp:
    version: "^1.4.0"
    
  espressif/led_strip:
    version: "^2.5.0"
    
  espressif/esp32-camera:
    version: "^2.0.0"
    rules:
      - if: "idf_version >=5.0.0"
      - if: "target not in [esp32p4]"
      
  espressif/esp_wifi_remote:
    version: ">=0.3.0"
    rules:
      - if: "target in [esp32p4]"
      
  espressif/esp_hosted:
    version: ">=0.0.6"
    rules:
      - if: "target in [esp32p4]"